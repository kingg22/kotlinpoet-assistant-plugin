# Documentación CodeBlock

doc.placeholder.title=Placeholder de KotlinPoet {0}
doc.control.title=Símbolo de control de KotlinPoet {0}

# Placeholders

doc.placeholder.L=Valor Literal %L
doc.placeholder.L.desc=Emite un literal sin escapado. Los argumentos pueden ser strings, primitivos, TypeSpec, AnnotationSpec u otros CodeBlock.

doc.placeholder.N=Nombre %N
doc.placeholder.N.desc=Emite un nombre evitando colisiones. Los argumentos pueden ser CharSequence, ParameterSpec, PropertySpec, FunSpec o TypeSpec.

doc.placeholder.S=String %S
doc.placeholder.S.desc=Escapa el valor como string, lo envuelve entre comillas dobles y lo emite. También escapa signos de dólar ($). Usa %P para plantillas de string.

doc.placeholder.P=Plantilla de String %P
doc.placeholder.P.desc=Similar a %S pero no escapa signos de dólar ($), permitiendo crear plantillas de string.

doc.placeholder.T=Referencia de Tipo %T
doc.placeholder.T.desc=Emite una referencia de tipo. Los tipos se importan si es posible. Los argumentos pueden ser Class, KClass o TypeName.

doc.placeholder.M=Referencia de Miembro %M
doc.placeholder.M.desc=Emite una referencia a miembro (función o propiedad). Si el miembro es importable, el import se resolverá automáticamente. El argumento debe ser MemberName.

# Control symbols

doc.control.percent=%%
doc.control.percent.desc=Emite un signo de porcentaje.

doc.control.wrap=\u2662
doc.control.wrap.desc=Emite un espacio o salto de línea dependiendo de la posición. Prefiere envolver líneas antes de las 100 columnas.

doc.control.space=·
doc.control.space.desc=Emite un espacio que nunca se envuelve.

doc.control.indent=\u21E5
doc.control.indent.desc=Incrementa el nivel de indentación.

doc.control.outdent=\u21E4
doc.control.outdent.desc=Reduce el nivel de indentación.

doc.control.statement.begin=«
doc.control.statement.begin.desc=Inicia una sentencia. En sentencias multilínea, cada línea después de la primera se indenta doble.

doc.control.statement.end=»
doc.control.statement.end.desc=Finaliza una sentencia.

doc.unknown.placeholder=Placeholder desconocido
doc.unknown.control=Símbolo de control desconocido
