# Documentación CodeBlock

doc.placeholder.title=Placeholder de KotlinPoet {0}
doc.control.title=Símbolo de control de KotlinPoet {0}

# Placeholders

doc.placeholder.L=Valor literal %L
doc.placeholder.L.desc=Emite un valor literal sin escaparlo.<br>\
Los argumentos pueden ser \
<a href="psi_element://kotlin.String">strings</a>, primitivos, \
<a href="psi_element://com.squareup.kotlinpoet.TypeSpec">TypeSpec</a>, \
<a href="psi_element://com.squareup.kotlinpoet.AnnotationSpec">AnnotationSpec</a> o incluso otras instancias de \
<a href="psi_element://com.squareup.kotlinpoet.CodeBlock">CodeBlock</a>.

doc.placeholder.N=Nombre %N
doc.placeholder.N.desc=Emite un nombre evitando colisiones.<br>\
Los argumentos pueden ser \
<a href="psi_element://kotlin.CharSequence">CharSequence</a>, \
<a href="psi_element://com.squareup.kotlinpoet.ParameterSpec">ParameterSpec</a>, \
<a href="psi_element://com.squareup.kotlinpoet.PropertySpec">PropertySpec</a>, \
<a href="psi_element://com.squareup.kotlinpoet.FunSpec">FunSpec</a> o \
<a href="psi_element://com.squareup.kotlinpoet.TypeSpec">TypeSpec</a>.

doc.placeholder.S=Literal de String %S
doc.placeholder.S.desc=Escapa el valor como <i>String</i>, lo envuelve entre comillas dobles y lo emite. \
También escapa los signos de dólar ($).<br>\
Usa <code>%P</code> para crear <i>String templates</i>.

doc.placeholder.P=Plantilla de String %P
doc.placeholder.P.desc=Similar a <code>%S</code>, pero no escapa los signos de dólar ($), permitiendo crear <i>String templates</i> de Kotlin.

doc.placeholder.T=Referencia de tipo %T
doc.placeholder.T.desc=Emite una referencia de tipo. Los tipos se importan si es posible.<br>\
Los argumentos pueden ser \
<a href="psi_element://java.lang.Class">Class</a>, \
<a href="psi_element://kotlin.reflect.KClass">KClass</a> o \
<a href="psi_element://com.squareup.kotlinpoet.TypeName">TypeName</a>.

doc.placeholder.M=Referencia de miembro %M
doc.placeholder.M.desc=Emite una referencia a un miembro (función o propiedad). \
Si el miembro es importable, el import se resolverá automáticamente.<br>\
El argumento debe ser \
<a href="psi_element://com.squareup.kotlinpoet.MemberName">MemberName</a>.

