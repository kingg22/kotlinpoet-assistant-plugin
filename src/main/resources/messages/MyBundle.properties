# CodeBlock documentation

doc.placeholder.title=KotlinPoet Placeholder {0}
doc.control.title=KotlinPoet Control {0}

# Placeholders

doc.placeholder.L=Literal Value %L
doc.placeholder.L.desc=Emits a literal value without escaping. Arguments may be strings, primitives, TypeSpec, AnnotationSpec, or even other CodeBlock instances.

doc.placeholder.N=Name %N
doc.placeholder.N.desc=Emits a name while avoiding name collisions. Arguments may be CharSequence, ParameterSpec, PropertySpec, FunSpec, or TypeSpec.

doc.placeholder.S=String Literal %S
doc.placeholder.S.desc=Escapes the value as a string, wraps it in double quotes, and emits it. Dollar signs ($) are also escaped. Use %P to create string templates.

doc.placeholder.P=String Template %P
doc.placeholder.P.desc=Similar to %S but does not escape dollar signs ($), allowing creation of Kotlin string templates.

doc.placeholder.T=Type Reference %T
doc.placeholder.T.desc=Emits a type reference. Types will be imported if possible. Arguments may be Class, KClass, or TypeName.

doc.placeholder.M=Member Reference %M
doc.placeholder.M.desc=Emits a member reference (function or property). If the member is importable, the import will be resolved automatically. The argument must be MemberName.

# Control symbols

doc.control.percent=%%
doc.control.percent.desc=Emits a percent sign.

doc.control.wrap=\u2662
doc.control.wrap.desc=Emits either a space or newline depending on position. Lines are wrapped before reaching 100 columns.

doc.control.space=\u00B7
doc.control.space.desc=Emits a non-wrapping space.

doc.control.indent=\u21E5
doc.control.indent.desc=Increases indentation level.

doc.control.outdent=\u21E4
doc.control.outdent.desc=Decreases indentation level.

doc.control.statement.begin=\u00AB
doc.control.statement.begin.desc=Begins a statement. For multiline statements every subsequent line is double-indented.

doc.control.statement.end=\u00BB
doc.control.statement.end.desc=Ends a statement.

doc.unknown.placeholder=Unknown placeholder
doc.unknown.control=Unknown control symbol
